<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Premium Flipbook</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --paper-bg: #fcfbf9;
            --spine-shadow: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.1) 60%, rgba(255,255,255,0) 100%);
        }

        body {
            background: radial-gradient(circle at 50% 50%, #3a4049 0%, #1a1d21 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: pan-y; /* Better mobile touch handling */
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1d21;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Book Container & Pages --- */
        .container {
            width: 100%;
            height: 85vh; /* Leaves room for controls */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flip-book {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .page {
            background-color: var(--paper-bg);
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.02); /* Paper texture feel */
        }

        .page[data-density="hard"] {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: solid 2px #0f172a;
        }

        /* The visual book spine/center fold */
        .page::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background: var(--spine-shadow);
            pointer-events: none;
            opacity: 0.5;
        }

        .page img {
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none; 
            user-select: none;
        }

        /* --- Floating Glass Controls --- */
        .controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            width: 45px; height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; letter-spacing: 2px;">LOADING</p>
    </div>

    <audio id="page-sound" src="https://assets.mixkit.co/active_storage/sfx/2180/2180-preview.mp3" preload="auto"></audio>

    <div class="container">
        <div class="flip-book" id="flipbook">
            <div class="page" data-density="hard"><img src="page_0.png" alt="Cover"></div>
            <div class="page"><img src="page_1.png" alt="Page 1"></div>
            <div class="page"><img src="page_2.png" alt="Page 2"></div>
            <div class="page"><img src="page_3.png" alt="Page 3"></div>
            <div class="page" data-density="hard"><img src="page_4.png" alt="Back Cover"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-prev" title="Previous Page"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="btn" id="btn-sound" title="Toggle Sound"><i class="fa-solid fa-volume-high"></i></button>
        <button class="btn" id="btn-fullscreen" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
        <button class="btn" id="btn-next" title="Next Page"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const flipbookEl = document.getElementById('flipbook');
            const soundEl = document.getElementById('page-sound');
            let soundEnabled = true;

            // 1. Initialize StPageFlip with true responsive stretching
            const pageFlip = new St.PageFlip(flipbookEl, {
                width: 450, 
                height: 600,
                size: "stretch", // Allows the book to stretch and shrink based on screen size
                minWidth: 300,
                maxWidth: 1000,
                minHeight: 400,
                maxHeight: 1200,
                maxShadowOpacity: 0.6,
                showCover: true,
                mobileScrollSupport: false,
                usePortrait: true // Essential: forces 1-page view on mobile phones
            });

            // Load HTML elements
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // 2. Remove Loader when ready
            pageFlip.on('init', () => {
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                }, 500); // Small delay to ensure images are painting
            });

            // 3. Play Sound on Flip
            pageFlip.on('flip', (e) => {
                if (soundEnabled) {
                    soundEl.currentTime = 0; // Reset sound to start
                    soundEl.play().catch(e => console.log("Audio play prevented by browser policy"));
                }
            });

            // 4. Button Logic
            document.querySelector('#btn-prev').addEventListener('click', () => pageFlip.flipPrev());
            document.querySelector('#btn-next').addEventListener('click', () => pageFlip.flipNext());

            // Sound Toggle
            document.querySelector('#btn-sound').addEventListener('click', function() {
                soundEnabled = !soundEnabled;
                const icon = this.querySelector('i');
                if (soundEnabled) {
                    icon.className = 'fa-solid fa-volume-high';
                } else {
                    icon.className = 'fa-solid fa-volume-xmark';
                }
            });

            // Fullscreen API Logic
            document.querySelector('#btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            });
        });
    </script>
</body>
</html>
