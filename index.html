<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Powered Premium Flipbook</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --paper-bg: #fcfbf9;
            --spine-shadow: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 60%, rgba(255,255,255,0) 100%);
            /* Dynamic background colors that JS will update */
            --bg-color-1: #2b3036;
            --bg-color-2: #0f1115;
        }

        body {
            /* Ambient lighting that reacts to page turns */
            background: radial-gradient(circle at 50% 50%, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            transition: background 1s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: pan-y; 
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f1115;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; transition: opacity 0.6s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1); border-top-color: #00d2ff;
            border-radius: 50%; animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- AI Subtitles (Visual Feedback) --- */
        #ai-subtitle {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 10px 25px; border-radius: 30px; font-size: 14px; letter-spacing: 1px;
            backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none; z-index: 50; text-align: center; max-width: 80%;
        }

        /* --- Book Container & Pages --- */
        .container { width: 100%; height: 85vh; display: flex; justify-content: center; align-items: center; }
        .flip-book { box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8); }
        .page {
            background-color: var(--paper-bg); overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.03); 
        }

        /* Hardcovers */
        .page[data-density="hard"] {
            background: linear-gradient(135deg, #1a202c, #0d1117);
            border: solid 2px #0d1117;
        }

        /* Book Spine Center Fold */
        .page::after {
            content: ''; position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            background: var(--spine-shadow); pointer-events: none; opacity: 0.6;
        }

        .page img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; }

        /* --- Glassmorphic AI Control Hub --- */
        .controls {
            position: fixed; bottom: 30px; display: flex; gap: 12px;
            background: rgba(25, 30, 36, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn {
            background: transparent; border: none; color: #a0aec0;
            font-size: 18px; width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover { color: #fff; background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        .btn.active { color: #00d2ff; background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        .divider { width: 1px; background: rgba(255,255,255,0.1); margin: 0 5px; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>
    
    <div id="ai-subtitle">AI Voice Active...</div>

    <audio id="page-sound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" preload="auto"></audio>

    <div class="container">
        <div class="flip-book" id="flipbook">
            <div class="page" data-density="hard" data-text="Welcome to the presentation. This is the front cover."><img src="page_0.png" alt="Cover"></div>
            <div class="page" data-text="Page one. Introduction to our digital module."><img src="page_1.png" alt="1"></div>
            <div class="page" data-text="Page two. System architecture and design."><img src="page_2.png" alt="2"></div>
            <div class="page" data-text="Page three."><img src="page_3.png" alt="3"></div>
            <div class="page" data-text="Page four."><img src="page_4.png" alt="4"></div>
            <div class="page" data-text="Page five."><img src="page_5.png" alt="5"></div>
            <div class="page" data-text="Page six."><img src="page_6.png" alt="6"></div>
            <div class="page" data-text="Page seven."><img src="page_7.png" alt="7"></div>
            <div class="page" data-text="Page eight."><img src="page_8.png" alt="8"></div>
            <div class="page" data-text="Page nine."><img src="page_9.png" alt="9"></div>
            <div class="page" data-text="Page ten."><img src="page_10.png" alt="10"></div>
            <div class="page" data-text="Page eleven."><img src="page_11.png" alt="11"></div>
            <div class="page" data-text="Page twelve."><img src="page_12.png" alt="12"></div>
            <div class="page" data-text="Page thirteen. Summary and conclusions."><img src="page_13.png" alt="13"></div>
            <div class="page" data-density="hard" data-text="Thank you for reading. This is the back cover."><img src="page_14.png" alt="Back Cover"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-prev" title="Previous"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="btn" id="btn-next" title="Next"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="divider"></div>
        <button class="btn" id="btn-play" title="Auto-Play Mode"><i class="fa-solid fa-play"></i></button>
        <button class="btn" id="btn-ai" title="AI Smart Reader"><i class="fa-solid fa-robot"></i></button>
        <div class="divider"></div>
        <button class="btn active" id="btn-sound" title="Toggle Sound"><i class="fa-solid fa-volume-high"></i></button>
        <button class="btn" id="btn-fullscreen" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const flipbookEl = document.getElementById('flipbook');
            const soundEl = document.getElementById('page-sound');
            const pages = document.querySelectorAll('.page');
            const subtitle = document.getElementById('ai-subtitle');
            
            let soundEnabled = true;
            let autoPlayInterval = null;
            let aiReaderActive = false;
            let synth = window.speechSynthesis;

            // 1. Initialize Advanced StPageFlip
            const pageFlip = new St.PageFlip(flipbookEl, {
                width: 450, height: 600, size: "stretch",
                minWidth: 300, maxWidth: 1000, minHeight: 400, maxHeight: 1200,
                maxShadowOpacity: 0.7, showCover: true, mobileScrollSupport: false, usePortrait: true
            });
            pageFlip.loadFromHTML(pages);

            // 2. Remove Loader smoothly
            pageFlip.on('init', () => {
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
                }, 800);
            });

            // 3. Dynamic UX on Flip: Sound, Lighting, and AI Speech
            pageFlip.on('flip', (e) => {
                // Sound
                if (soundEnabled) {
                    soundEl.currentTime = 0;
                    soundEl.play().catch(() => {});
                }

                // Dynamic Ambient Lighting (Changes based on how far through the book you are)
                const progress = e.data / 14; 
                const colorShift = Math.floor(progress * 40); // Subtle shift in hue
                document.documentElement.style.setProperty('--bg-color-1', `rgb(${43 - colorShift}, ${48 - colorShift}, 54)`);

                // AI Reader Logic
                if (aiReaderActive) {
                    synth.cancel(); // Stop current speech
                    const textToRead = pages[e.data].getAttribute('data-text');
                    if (textToRead) {
                        const utterance = new SpeechSynthesisUtterance(textToRead);
                        utterance.rate = 0.95; // Slightly slower, more professional reading pace
                        utterance.pitch = 1;
                        synth.speak(utterance);
                        
                        // Visual feedback
                        subtitle.textContent = "AI Reading: " + textToRead;
                        subtitle.style.opacity = '1';
                        utterance.onend = () => subtitle.style.opacity = '0';
                    }
                }
            });

            // 4. Button Controls
            document.querySelector('#btn-prev').addEventListener('click', () => pageFlip.flipPrev());
            document.querySelector('#btn-next').addEventListener('click', () => pageFlip.flipNext());

            // Auto-Play Feature
            const btnPlay = document.querySelector('#btn-play');
            btnPlay.addEventListener('click', () => {
                if (autoPlayInterval) {
                    clearInterval(autoPlayInterval);
                    autoPlayInterval = null;
                    btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
                    btnPlay.classList.remove('active');
                } else {
                    pageFlip.flipNext(); // Turn immediately
                    autoPlayInterval = setInterval(() => { pageFlip.flipNext(); }, 5000); // Turns every 5 seconds
                    btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
                    btnPlay.classList.add('active');
                }
            });

            // AI Reader Feature
            const btnAi = document.querySelector('#btn-ai');
            btnAi.addEventListener('click', () => {
                aiReaderActive = !aiReaderActive;
                if (aiReaderActive) {
                    btnAi.classList.add('active');
                    subtitle.textContent = "AI Voice Enabled";
                    subtitle.style.opacity = '1';
                    setTimeout(() => subtitle.style.opacity = '0', 2000);
                    // Read current page immediately
                    const currentIdx = pageFlip.getCurrentPageIndex();
                    const text = pages[currentIdx].getAttribute('data-text');
                    if(text) synth.speak(new SpeechSynthesisUtterance(text));
                } else {
                    btnAi.classList.remove('active');
                    synth.cancel();
                    subtitle.style.opacity = '0';
                }
            });

            // Sound Toggle
            const btnSound = document.querySelector('#btn-sound');
            btnSound.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                btnSound.innerHTML = soundEnabled ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark"></i>';
                btnSound.classList.toggle('active', soundEnabled);
            });

            // Fullscreen
            document.querySelector('#btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => {}); } 
                else { document.exitFullscreen(); }
            });
        });
    </script>
</body>
</html>
