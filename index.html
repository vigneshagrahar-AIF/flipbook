<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium DIY Flipbook</title>
    <style>
        /* Setting up some variables for easy color changes later */
        :root {
            --book-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            --paper-bg: #fdfaf5; /* A soft, warm paper white */
        }

        body {
            /* Sophisticated gradient background looking like a studio spotlight */
            background: radial-gradient(circle at 50% 40%, #5a6673 0%, #2b3036 80%, #1a1d21 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }

        /* Optional: Add a nice title above the book */
        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* The book container */
        .flip-book {
            box-shadow: var(--book-shadow);
            transition: box-shadow 0.3s ease;
        }

        /* Individual pages */
        .page {
            background-color: var(--paper-bg);
            overflow: hidden;
            border: solid 1px #e3dac9; /* Subtle paper edge */
            box-sizing: border-box;
            /* Soft inner shadow to simulate paper depth */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.03);
        }

        /* Styling specifically for the hard covers */
        .page[data-density="hard"] {
            background-color: #2c3e50; /* A premium dark blue cover */
            border: solid 2px #1a252f;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Prevents the user from accidentally "dragging" the image file */
            pointer-events: none; 
        }

        /* Modern UI Controls */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px); /* Gives it a frosted glass look */
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>MY PORTFOLIO</h1>

    <div class="flip-book" id="flipbook">
        <div class="page" data-density="hard"><img src="page_0.png" alt="Front Cover"></div>
        <div class="page"><img src="page_1.png" alt="Page 1"></div>
        <div class="page"><img src="page_2.png" alt="Page 2"></div>
        <div class="page"><img src="page_3.png" alt="Page 3"></div>
        <div class="page"><img src="page_4.png" alt="Page 4"></div>
        <div class="page"><img src="page_5.png" alt="Page 5"></div>
        <div class="page"><img src="page_6.png" alt="Page 6"></div>
        <div class="page"><img src="page_7.png" alt="Page 7"></div>
        <div class="page"><img src="page_8.png" alt="Page 8"></div>
        <div class="page"><img src="page_9.png" alt="Page 9"></div>
        <div class="page"><img src="page_10.png" alt="Page 10"></div>
        <div class="page"><img src="page_11.png" alt="Page 11"></div>
        <div class="page"><img src="page_12.png" alt="Page 12"></div>
        <div class="page"><img src="page_13.png" alt="Page 13"></div>
        <div class="page"><img src="page_14.png" alt="Page 14"></div>
        <div class="page" data-density="hard"><img src="page_15.png" alt="Back Cover"></div>
    </div>

    <div class="controls">
        <button id="btn-prev">❮ Previous</button>
        <button id="btn-next">Next ❯</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const flipbookEl = document.getElementById('flipbook');
            
            const pageFlip = new St.PageFlip(flipbookEl, {
                width: 450, // Slightly larger page width for better viewing
                height: 600,
                size: "fixed", 
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1350,
                maxShadowOpacity: 0.6, // Makes the center fold shadow darker and more realistic
                showCover: true,
                mobileScrollSupport: false, 
                usePortrait: true // Essential for mobile phones!
            });

            // Load the pages
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // Connect the buttons to the flipping action
            document.querySelector('#btn-prev').addEventListener('click', () => {
                pageFlip.flipPrev();
            });

            document.querySelector('#btn-next').addEventListener('click', () => {
                pageFlip.flipNext();
            });
        });
    </script>
</body>
</html>
